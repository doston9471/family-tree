services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ancestry_tree
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ancestry_tree_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ancestry_tree -d ancestry_tree_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://ancestry_tree:password@db:5432/ancestry_tree_development
      # Set SEED=1 to force re-seed (wipes people and reloads db/seeds.rb)
      SEED: ${SEED:-0}
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle:
